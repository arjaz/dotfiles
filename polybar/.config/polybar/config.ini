[colors]
background = #fff
background-alt = #f6f6f6
foreground = #333333
primary = #74A12E
secondary = #fcf4a3
alert = #74A12E
disabled = #aaaaaa

[colors-dark]
background = #000
background-alt = #3d3934
foreground = #fffefc
primary = #74A12E
secondary = #fcf4a3
alert = #bb544a
disabled = #4d4c5d

[bar/arjaz]
width = 100%
height = 15pt
; radius = 7
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 1pt
line-color = ${colors.primary}
; border-size = 1pt
border-color = ${colors.disabled}
; offset-x = 2%
; offset-y = 15
padding-left = 0
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}
fixed-center = true
font-0 = "Iosevka Aile:size=11;2"
font-1 = "Iosevka Nerd Font Propo:size=17;2"
modules-left = xworkspaces
modules-center = popup-calendar
modules-right = player-mpris-tail pulseaudio
cursor-click = pointer
enable-ipc = true
tray-position = none
; wm-restack = i3
override-redirect = false

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
label-active = %{T2}●%{T-}
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
; label-active-padding = 1
label-occupied = %{T2}●%{T-}
; label-occupied-padding = 1
label-occupied-foreground = ${colors.disabled}
label-urgent = %{T2}●%{T-}
label-urgent-background = ${colors.alert}
; label-urgent-padding = 1
label-empty = %{T2}○%{T-}
label-empty-foreground = ${colors.disabled}
; label-empty-padding = 1

[module/pulseaudio]
type = internal/pulseaudio
click-right = pwvucontrol
format-volume = <ramp-volume> <label-volume>
label-volume = "%percentage%%"
label-volume-foreground = ${colors.foreground}
ramp-volume-foreground = ${colors.primary}
ramp-volume-0 = "▁"
ramp-volume-1 = "▂"
ramp-volume-2 = "▃"
ramp-volume-3 = "▄"
ramp-volume-4 = "▅"
ramp-volume-5 = "▆"
ramp-volume-6 = "▇"
ramp-volume-7 = "█"
ramp-volume-8 = "█"
ramp-volume-9 = "█"
format-muted = <label-muted>
label-muted = "muted"
label-muted-foreground = ${colors.alert}

[module/player-mpris-tail]
type = custom/script
exec = ~/.config/polybar/player-mpris*-tail.py -f '%{A1:~/.config/polybar/player-mpris-tail.py play-pause:}{icon-reversed}%{A} {:artist:t18:{artist}:}{:artist: - :}{:t20:{title}:}' --icon-playing ▶ --icon-paused ⏸
tail = true

[module/eth]
type = internal/network
interval = 5
format-connected =
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%
interface-type = wired
ping-interval = 3

[module/popup-calendar]
type = custom/script
exec = ~/.config/polybar/popup-calendar.sh
interval = 1
click-left = ~/.config/polybar/popup-calendar.sh --popup &

[module/date]
type = internal/date
interval = 1
date = "%l:%M %P "
date-alt = %l:%M %P, %a, %d.%m.%Y
label = %date%
label-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
pseudo-transparency = true

